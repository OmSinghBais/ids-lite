version: "3.9"

services:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # Set to "real" to enable live packet capture (needs privileged: true)
      - CAPTURE_MODE=synthetic
    # privileged: true   ← uncomment ONLY for real packet capture
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped